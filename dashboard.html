<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<h3 class="text-white">

Library Dashboard

</h3>

<a href="/" class="btn btn-warning">

Logout

</a>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-4">

<div class="card bg-primary text-white">

<div class="card-body">

<h4>Total Books</h4>

<h1>{{total}}</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-success text-white">

<div class="card-body">

<h4>Available</h4>

<h1>{{available}}</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-danger text-white">

<div class="card-body">

<h4>Issued</h4>

<h1>{{issued}}</h1>

</div>

</div>

</div>

</div>

<br>

<a href="/books"
class="btn btn-primary">

Manage Books

</a>

<hr>

<h3>Recent Books</h3>

<table class="table table-bordered table-hover">

<tr>

<th>ID</th>

<th>Title</th>

<th>Author</th>

<th>Status</th>

</tr>

{% for book in books %}

<tr>

<td>{{book.id}}</td>

<td>{{book.title}}</td>

<td>{{book.author}}</td>

<td>{{book.status}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
